services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp
      MYSQL_PASSWORD: wppw
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpw"]
      interval: 5s
      timeout: 5s
      retries: 20

  wp:
    image: wordpress:php8.3-apache
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wppw
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define('INFOUNO_ENCRYPTION_KEY', '75a84433b3abf622c3167ff87b06c60fcc2140831b0b69e0df24816ed6a99792');
        define('INFOUNO_ANTHROPIC_KEY', 'sk-ant-dummy-smoke');
        define('INFOUNO_OPENAI_KEY', 'sk-dummy-smoke');
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', '/var/www/html/wp-content/debug.log');
        define('WP_DEBUG_DISPLAY', false);
    volumes:
      - wp_data:/var/www/html
      - ../plugins/infouno-custom:/var/www/html/wp-content/plugins/infouno-custom

  wpcli:
    image: wordpress:cli-php8.3
    user: "33:33"
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wppw
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define('INFOUNO_ENCRYPTION_KEY', '75a84433b3abf622c3167ff87b06c60fcc2140831b0b69e0df24816ed6a99792');
        define('INFOUNO_ANTHROPIC_KEY', 'sk-ant-dummy-smoke');
        define('INFOUNO_OPENAI_KEY', 'sk-dummy-smoke');
    volumes:
      - wp_data:/var/www/html
      - ../plugins/infouno-custom:/var/www/html/wp-content/plugins/infouno-custom
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  wp_data:
